        // =====================================================================
        // 12. VIEW: ANALISIS BULANAN
        // =====================================================================
        function renderAnalisisBulanan(container) {
            const { keberadaan, guru } = state;
            const bulan = state.analisisBulan;
            const tahun = state.analisisTahun;
            const tabView = state.analisisTab || 'kalendar';

            const tahunList = [...new Set(keberadaan.map(k => new Date(k.Tarikh_Mula).getFullYear()))].sort((a, b) => b - a);
            if (!tahunList.includes(new Date().getFullYear())) tahunList.unshift(new Date().getFullYear());

            const start = new Date(tahun, bulan, 1);
            const end = new Date(tahun, bulan + 1, 0);
            end.setHours(23, 59, 59, 999);
            const dataBulan = keberadaan.filter(k => {
                const mula = new Date(k.Tarikh_Mula);
                const tamat = new Date(k.Tarikh_Tamat);
                return mula <= end && tamat >= start;
            });

            // Kalendar
            const days = getDaysInMonth(tahun, bulan);
            const kalendarData = Array.from({ length: days }, (_, i) => {
                const hari = i + 1;
                const tarikh = new Date(tahun, bulan, hari);
                tarikh.setHours(0, 0, 0, 0);
                const count = dataBulan.filter(k => {
                    const mula = new Date(k.Tarikh_Mula);
                    const tamat = new Date(k.Tarikh_Tamat);
                    mula.setHours(0, 0, 0, 0);
                    tamat.setHours(0, 0, 0, 0);
                    return tarikh >= mula && tarikh <= tamat;
                }).length;
                return { hari, count };
            });

            const maxCount = Math.max(...kalendarData.map(d => d.count), 1);

            const getHeatColor = (count) => {
                if (count === 0) return 'bg-gray-50 text-gray-400';
                const ratio = count / maxCount;
                if (ratio < 0.25) return 'bg-blue-100 text-blue-700';
                if (ratio < 0.5) return 'bg-blue-200 text-blue-800';
                if (ratio < 0.75) return 'bg-blue-300 text-blue-900';
                return 'bg-blue-500 text-white';
            };

            const firstDay = getFirstDayOfMonth(tahun, bulan);

            // Individu
            const dataIndividu = {};
            dataBulan.forEach(k => {
                if (!dataIndividu[k.id_Guru]) dataIndividu[k.id_Guru] = { nama: k.Nama_Guru, rekod: [], jenis: {} };
                dataIndividu[k.id_Guru].rekod.push(k);
                dataIndividu[k.id_Guru].jenis[k.Jenis_Keberadaan] = (dataIndividu[k.id_Guru].jenis[k.Jenis_Keberadaan] ||
                    0) + 1;
            });
            const individuArr = Object.entries(dataIndividu).map(([id, v]) => ({ id, ...v })).sort((a, b) => b.rekod.length - a
                .rekod.length);

            // Jawatan
            const dataJawatan = {};
            dataBulan.forEach(k => {
                const g = guru.find(g => g.id_Guru === k.id_Guru);
                const jawatan = g?.Jawatan || 'Tidak Diketahui';
                dataJawatan[jawatan] = (dataJawatan[jawatan] || 0) + 1;
            });
            const jawatanArr = Object.entries(dataJawatan).sort((a, b) => b[1] - a[1]);

            container.innerHTML = `
                    <div class="space-y-5">
                        <div class="flex items-center justify-between flex-wrap gap-3">
                            <div>
                                <h2 class="page-header">Analisis Bulanan</h2>
                                <p class="page-subheader">Trend dan kekerapan keberadaan guru mengikut bulan</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm">Bulan:</span>
                                <select id="abBulan" class="border border-border rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--biru))]">
                                    ${Array.from({length:12}, (_,i) => `<option value="${i}" ${i===bulan?'selected':''}>${getBulanName(i)}</option>`).join('')}
                                </select>
                                <select id="abTahun" class="border border-border rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--biru))]">
                                    ${tahunList.map(t => `<option value="${t}" ${t===tahun?'selected':''}>${t}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div class="stat-card"><div class="text-2xl font-bold text-[hsl(var(--biru))]">${dataBulan.length}</div><div class="text-xs text-muted-foreground">Jumlah Rekod</div></div>
                            <div class="stat-card"><div class="text-2xl font-bold text-[hsl(var(--merah-jambu))]">${individuArr.length}</div><div class="text-xs text-muted-foreground">Guru Terlibat</div></div>
                            <div class="stat-card"><div class="text-2xl font-bold text-amber-600">${kalendarData.filter(d=>d.count>0).length}</div><div class="text-xs text-muted-foreground">Hari Aktif</div></div>
                        </div>

                        <div class="flex gap-1 bg-muted p-1 rounded-lg w-fit">
                            ${['kalendar','individu','jawatan'].map(t => `
                                <button data-abtab="${t}" class="px-3 py-1.5 rounded-md text-xs font-medium transition ${tabView===t?'bg-white text-[hsl(var(--biru))] shadow-sm':'text-muted-foreground hover:text-foreground'}">
                                    ${t==='kalendar'?'Kalendar Visual':t==='individu'?'Analisis Individu':'Analisis Jawatan'}
                                </button>
                            `).join('')}
                        </div>

                        ${tabView === 'kalendar' ? `
                            <div class="bg-white rounded-lg border border-border p-5 shadow-sm">
                                <h3 class="font-semibold text-sm mb-4">${getBulanName(bulan)} ${tahun}</h3>
                                <div class="grid grid-cols-7 gap-1 mb-1">
                                    ${['Isn','Sel','Rab','Kha','Jum','Sab','Ahd'].map(d => `<div class="text-center text-xs font-medium text-muted-foreground py-1">${d}</div>`).join('')}
                                </div>
                                <div class="grid grid-cols-7 gap-1">
                                    ${Array.from({length: firstDay}, (_,i) => `<div key="empty-${i}"></div>`).join('')}
                                    ${kalendarData.map(({hari, count}) => `
                                        <div class="aspect-square rounded-md flex flex-col items-center justify-center text-xs font-medium cursor-default transition-colors ${getHeatColor(count)}">
                                            <div>${hari}</div>
                                            ${count > 0 ? `<div class="text-[10px] font-bold">${count}</div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="flex items-center gap-3 mt-4 text-xs text-muted-foreground">
                                    <span>Intensiti:</span>
                                    <div class="flex items-center gap-1"><div class="w-4 h-4 bg-gray-50 border rounded"></div><span>0</span></div>
                                    <div class="flex items-center gap-1"><div class="w-4 h-4 bg-blue-100 rounded"></div><span>Rendah</span></div>
                                    <div class="flex items-center gap-1"><div class="w-4 h-4 bg-blue-300 rounded"></div><span>Sederhana</span></div>
                                    <div class="flex items-center gap-1"><div class="w-4 h-4 bg-blue-500 rounded"></div><span>Tinggi</span></div>
                                </div>
                            </div>
                        ` : tabView === 'individu' ? `
                            <div class="bg-white rounded-lg border border-border shadow-sm">
                                <div class="p-4 border-b border-border"><span class="font-semibold text-sm">Kekerapan Rekod Individu — ${getBulanName(bulan)} ${tahun}</span></div>
                                ${individuArr.length === 0 ? `<div class="text-center py-8 text-sm text-muted-foreground">Tiada rekod bulan ini</div>` : `
                                    <div class="divide-y divide-border">
                                        ${individuArr.map((d, idx) => `
                                            <div class="p-4">
                                                <div class="flex items-center justify-between mb-2">
                                                    <div class="flex items-center gap-2">
                                                        <span class="text-xs font-bold text-muted-foreground w-5">${idx+1}.</span>
                                                        <span class="font-medium text-sm">${d.nama}</span>
                                                    </div>
                                                    <span class="text-sm font-bold text-[hsl(var(--biru))]">${d.rekod.length} rekod</span>
                                                </div>
                                                <div class="flex flex-wrap gap-1.5 ml-7">
                                                    ${Object.entries(d.jenis).map(([jenis, bil]) => `
                                                        <span class="text-xs px-2 py-0.5 rounded-full ${getBadgeColor(jenis)}">${jenis}: ${bil}</span>
                                                    `).join('')}
                                                </div>
                                                <div class="mt-2 ml-7 space-y-1">
                                                    ${d.rekod.slice(0,3).map(r => `
                                                        <div class="text-xs text-muted-foreground flex items-center gap-2">
                                                            <span>${formatTarikh(r.Tarikh_Mula)}${r.Tarikh_Mula !== r.Tarikh_Tamat ? ` — ${formatTarikh(r.Tarikh_Tamat)}` : ''}</span>
                                                            ${r.Nama_Program ? `<span class="text-muted-foreground">· ${r.Nama_Program}</span>` : ''}
                                                        </div>
                                                    `).join('')}
                                                    ${d.rekod.length > 3 ? `<div class="text-xs text-muted-foreground">...dan ${d.rekod.length - 3} rekod lagi</div>` : ''}
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        ` : `
                            <div class="bg-white rounded-lg border border-border p-5 shadow-sm">
                                <h3 class="font-semibold text-sm mb-4">Pecahan Mengikut Jawatan — ${getBulanName(bulan)} ${tahun}</h3>
                                ${jawatanArr.length === 0 ? `<div class="text-center py-8 text-sm text-muted-foreground">Tiada rekod bulan ini</div>` : `
                                    <div class="space-y-3">
                                        ${jawatanArr.map(([jawatan, bil]) => `
                                            <div>
                                                <div class="flex justify-between mb-1">
                                                    <span class="text-sm">${jawatan}</span>
                                                    <span class="text-sm font-semibold">${bil} rekod</span>
                                                </div>
                                                <div class="h-3 bg-muted rounded-full overflow-hidden">
                                                    <div class="h-full rounded-full bg-[hsl(var(--merah-jambu))]" style="width: ${(bil / dataBulan.length) * 100}%"></div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        `}
                    </div>
                `;

            // Event bindings
            document.getElementById('abBulan').addEventListener('change', (e) => {
                state.analisisBulan = parseInt(e.target.value);
                renderContent();
            });
            document.getElementById('abTahun').addEventListener('change', (e) => {
                state.analisisTahun = parseInt(e.target.value);
                renderContent();
            });
            document.querySelectorAll('[data-abtab]').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.analisisTab = btn.dataset.abtab;
                    renderContent();
                });
            });
        }

        // =====================================================================
        // 13. VIEW: ANALISIS TAHUNAN
        // =====================================================================
        function renderAnalisisTahunan(container) {
            const { keberadaan, guru } = state;
            const tahun = state.analisisTahun;
            const tabView = state.analisisTahunanTab || 'trend';

            const tahunList = [...new Set(keberadaan.map(k => new Date(k.Tarikh_Mula).getFullYear()))].sort((a, b) => b - a);
            if (!tahunList.includes(new Date().getFullYear())) tahunList.unshift(new Date().getFullYear());

            const dataTahun = keberadaan.filter(k => new Date(k.Tarikh_Mula).getFullYear() === tahun);

            // Bulanan
            const dataBulan = Array.from({ length: 12 }, (_, i) => {
                const start = new Date(tahun, i, 1);
                const end = new Date(tahun, i + 1, 0);
                end.setHours(23, 59, 59, 999);
                const rekod = keberadaan.filter(k => {
                    const mula = new Date(k.Tarikh_Mula);
                    const tamat = new Date(k.Tarikh_Tamat);
                    return mula <= end && tamat >= start;
                });
                const pecahan = {};
                rekod.forEach(r => { pecahan[r.Jenis_Keberadaan] = (pecahan[r.Jenis_Keberadaan] || 0) + 1; });
                return { bulan: i, nama: getBulanShort(i), rekod: rekod.length, pecahan };
            });

            const maxBulan = Math.max(...dataBulan.map(d => d.rekod), 1);
            const bulanTertinggi = dataBulan.reduce((a, b) => a.rekod > b.rekod ? a : b);

            const dominanJenis = {};
            dataTahun.forEach(k => { dominanJenis[k.Jenis_Keberadaan] = (dominanJenis[k.Jenis_Keberadaan] || 0) + 1; });
            const dominan = Object.entries(dominanJenis).sort((a, b) => b[1] - a[1])[0];

            // Top individu
            const topMap = {};
            dataTahun.forEach(k => {
                if (!topMap[k.id_Guru]) topMap[k.id_Guru] = { nama: k.Nama_Guru, count: 0, jenis: {} };
                topMap[k.id_Guru].count++;
                topMap[k.id_Guru].jenis[k.Jenis_Keberadaan] = (topMap[k.id_Guru].jenis[k.Jenis_Keberadaan] || 0) + 1;
            });
            const topIndividu = Object.entries(topMap).map(([id, v]) => ({ id, ...v })).sort((a, b) => b.count - a.count)
                .slice(0, 15);

            // Jawatan
            const jawatanMap = {};
            dataTahun.forEach(k => {
                const g = guru.find(g => g.id_Guru === k.id_Guru);
                const j = g?.Jawatan || 'Tidak Diketahui';
                if (!jawatanMap[j]) jawatanMap[j] = { count: 0, jenis: {} };
                jawatanMap[j].count++;
                jawatanMap[j].jenis[k.Jenis_Keberadaan] = (jawatanMap[j].jenis[k.Jenis_Keberadaan] || 0) + 1;
            });
            const jawatanArr = Object.entries(jawatanMap).map(([jawatan, v]) => ({ jawatan, ...v })).sort((a, b) => b.count -
                a.count);

            container.innerHTML = `
                    <div class="space-y-5">
                        <div class="flex items-center justify-between flex-wrap gap-3">
                            <div>
                                <h2 class="page-header">Analisis Tahunan</h2>
                                <p class="page-subheader">Trend dan statistik keberadaan guru sepanjang tahun</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm">Tahun:</span>
                                <select id="atTahun" class="border border-border rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--biru))]">
                                    ${tahunList.map(t => `<option value="${t}" ${t===tahun?'selected':''}>${t}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div class="stat-card"><div class="text-2xl font-bold text-[hsl(var(--biru))]">${dataTahun.length}</div><div class="text-xs text-muted-foreground">Jumlah Rekod ${tahun}</div></div>
                            <div class="stat-card"><div class="text-2xl font-bold text-[hsl(var(--merah-jambu))]">${new Set(dataTahun.map(k=>k.id_Guru)).size}</div><div class="text-xs text-muted-foreground">Guru Terlibat</div></div>
                            <div class="stat-card"><div class="text-lg font-bold text-purple-600">${getBulanName(bulanTertinggi.bulan)}</div><div class="text-xs text-muted-foreground">Bulan Tertinggi (${bulanTertinggi.rekod})</div></div>
                            <div class="stat-card"><div class="text-sm font-bold text-amber-600">${dominan ? dominan[0] : '-'}</div><div class="text-xs text-muted-foreground">Jenis Dominan ${dominan ? `(${dominan[1]})` : ''}</div></div>
                        </div>

                        <div class="flex gap-1 bg-muted p-1 rounded-lg w-fit">
                            ${['trend','individu','jawatan'].map(t => `
                                <button data-attab="${t}" class="px-3 py-1.5 rounded-md text-xs font-medium transition ${tabView===t?'bg-white text-[hsl(var(--biru))] shadow-sm':'text-muted-foreground hover:text-foreground'}">
                                    ${t==='trend'?'Trend Bulanan':t==='individu'?'Top Individu':'Analisis Jawatan'}
                                </button>
                            `).join('')}
                        </div>

                        ${tabView === 'trend' ? `
                            <div class="bg-white rounded-lg border border-border p-5 shadow-sm">
                                <h3 class="font-semibold text-sm mb-5">Trend Keberadaan Bulanan — ${tahun}</h3>
                                <div class="flex items-end gap-2 h-48">
                                    ${dataBulan.map(d => `
                                        <div class="flex-1 flex flex-col items-center gap-1">
                                            <div class="text-xs font-semibold text-muted-foreground">${d.rekod > 0 ? d.rekod : ''}</div>
                                            <div class="w-full flex flex-col justify-end" style="height: 160px">
                                                <div class="w-full rounded-t-sm bg-[hsl(var(--biru))] transition-all hover:bg-[hsl(var(--biru-muda))]" style="height: ${(d.rekod / maxBulan) * 100}%; min-height: ${d.rekod > 0 ? '4px' : '0'}"></div>
                                            </div>
                                            <div class="text-[10px] text-muted-foreground">${d.nama}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : tabView === 'individu' ? `
                            <div class="bg-white rounded-lg border border-border shadow-sm">
                                <div class="p-4 border-b border-border"><span class="font-semibold text-sm">Top Individu — ${tahun}</span></div>
                                ${topIndividu.length === 0 ? `<div class="text-center py-8 text-sm text-muted-foreground">Tiada rekod tahun ini</div>` : `
                                    <div class="divide-y divide-border">
                                        ${topIndividu.map((d, idx) => `
                                            <div class="p-4 flex items-center gap-4">
                                                <div class="text-2xl font-bold text-muted-foreground w-8 text-center">${idx+1}</div>
                                                <div class="flex-1">
                                                    <div class="font-medium text-sm">${d.nama}</div>
                                                    <div class="flex flex-wrap gap-1 mt-1.5">
                                                        ${Object.entries(d.jenis).map(([jenis, bil]) => `
                                                            <span class="text-xs px-2 py-0.5 rounded-full ${getBadgeColor(jenis)}">${jenis}: ${bil}</span>
                                                        `).join('')}
                                                    </div>
                                                </div>
                                                <div class="text-right">
                                                    <div class="text-xl font-bold text-[hsl(var(--biru))]">${d.count}</div>
                                                    <div class="text-xs text-muted-foreground">rekod</div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        ` : `
                            <div class="bg-white rounded-lg border border-border p-5 shadow-sm">
                                <h3 class="font-semibold text-sm mb-4">Pecahan Mengikut Jawatan — ${tahun}</h3>
                                ${jawatanArr.length === 0 ? `<div class="text-center py-8 text-sm text-muted-foreground">Tiada rekod tahun ini</div>` : `
                                    <div class="space-y-4">
                                        ${jawatanArr.map(d => `
                                            <div>
                                                <div class="flex justify-between mb-1.5">
                                                    <span class="text-sm font-medium">${d.jawatan}</span>
                                                    <span class="text-sm font-bold text-[hsl(var(--biru))]">${d.count} rekod</span>
                                                </div>
                                                <div class="flex flex-wrap gap-1 mb-1.5">
                                                    ${Object.entries(d.jenis).map(([jenis, bil]) => `
                                                        <span class="text-xs px-2 py-0.5 rounded-full ${getBadgeColor(jenis)}">${jenis}: ${bil}</span>
                                                    `).join('')}
                                                </div>
                                                <div class="h-2 bg-muted rounded-full overflow-hidden">
                                                    <div class="h-full rounded-full bg-[hsl(var(--merah-jambu))]" style="width: ${(d.count / dataTahun.length) * 100}%"></div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        `}
                    </div>
                `;

            document.getElementById('atTahun').addEventListener('change', (e) => {
                state.analisisTahun = parseInt(e.target.value);
                renderContent();
            });
            document.querySelectorAll('[data-attab]').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.analisisTahunanTab = btn.dataset.attab;
                    renderContent();
                });
            });
        }

        // =====================================================================
        // 14. CONFIRM DIALOG
        // =====================================================================
        function showConfirm(title, message, onOk) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').innerHTML = message;
            document.getElementById('confirmOverlay').classList.remove('hidden');
            state.confirmCallback = onOk;
        }

        document.getElementById('confirmCancelBtn').addEventListener('click', () => {
            document.getElementById('confirmOverlay').classList.add('hidden');
            state.confirmCallback = null;
        });
        document.getElementById('confirmOkBtn').addEventListener('click', async () => {
            document.getElementById('confirmOverlay').classList.add('hidden');
            if (state.confirmCallback) {
                await state.confirmCallback();
                state.confirmCallback = null;
            }
        });

        // =====================================================================
        // 15. REFRESH DATA
        // =====================================================================
        async function refreshData() {
            state.loading = true;
            document.getElementById('refreshBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                const [guruRes, keberadaanRes, tetapanRes] = await Promise.all([
                    getGuru(),
                    getKeberadaan(),
                    getTetapan()
                ]);
                if (guruRes.status === 'success') state.guru = guruRes.data || [];
                if (keberadaanRes.status === 'success') state.keberadaan = keberadaanRes.data || [];
                if (tetapanRes.status === 'success') state.tetapan = tetapanRes.data;
                // Update header
                if (state.tetapan) {
                    const nama = state.tetapan.nama_sekolah || 'Sistem Keberadaan';
                    document.getElementById('headerSchoolName').textContent = nama;
                    if (state.tetapan.logo_sekolah) {
                        const img = document.createElement('img');
                        img.src = state.tetapan.logo_sekolah;
                        img.className = 'h-10 w-10 object-contain rounded';
                        img.onerror = () => { img.style.display = 'none'; };
                        const container = document.getElementById('logoContainer');
                        container.innerHTML = '';
                        container.appendChild(img);
                    }
                }
            } catch (e) {
                console.error('Refresh error:', e);
            }
            state.loading = false;
            document.getElementById('refreshBtn').innerHTML = '<i class="fas fa-sync-alt"></i>';
        }

        // =====================================================================
        // 16. ADMIN LOGIN
        // =====================================================================
        const loginOverlay = document.getElementById('loginOverlay');
        const loginPass = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        let loginShowPass = false;

        document.getElementById('adminToggleBtn').addEventListener('click', () => {
            if (state.isAdmin) {
                // Log keluar
                state.isAdmin = false;
                sessionStorage.removeItem('isAdmin');
                state.activeTab = 'relief';
                renderTabs();
                renderContent();
                document.getElementById('adminToggleLabel').textContent = 'Pentadbir';
            } else {
                loginOverlay.classList.remove('hidden');
                loginPass.value = '';
                loginError.classList.add('hidden');
                loginPass.focus();
            }
        });

        document.getElementById('loginCancelBtn').addEventListener('click', () => {
            loginOverlay.classList.add('hidden');
            loginPass.value = '';
            loginError.classList.add('hidden');
        });

        document.getElementById('loginSubmitBtn').addEventListener('click', handleLogin);
        loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });

        document.getElementById('loginTogglePass').addEventListener('click', () => {
            loginShowPass = !loginShowPass;
            loginPass.type = loginShowPass ? 'text' : 'password';
            document.querySelector('#loginTogglePass i').className = loginShowPass ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        async function handleLogin() {
            const pass = loginPass.value.trim();
            if (!pass) { loginError.textContent = 'Sila masukkan password';
                loginError.classList.remove('hidden'); return; }
            loginError.classList.add('hidden');
            const btn = document.getElementById('loginSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyemak...';
            try {
                const res = await semakPassword(pass);
                if (res.status === 'success') {
                    state.isAdmin = true;
                    sessionStorage.setItem('isAdmin', 'true');
                    loginOverlay.classList.add('hidden');
                    loginPass.value = '';
                    document.getElementById('adminToggleLabel').textContent = 'Log Keluar Admin';
                    state.activeTab = 'dashboard';
                    renderTabs();
                    renderContent();
                } else {
                    loginError.textContent = 'Password salah. Sila cuba lagi.';
                    loginError.classList.remove('hidden');
                }
            } catch (e) {
                loginError.textContent = 'Ralat sambungan. Sila cuba lagi.';
                loginError.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log Masuk';
        }

        // =====================================================================
        // 17. INIT
        // =====================================================================
        async function init() {
            // Check session
            if (sessionStorage.getItem('isAdmin') === 'true') {
                state.isAdmin = true;
                document.getElementById('adminToggleLabel').textContent = 'Log Keluar Admin';
                state.activeTab = 'dashboard';
            } else {
                state.activeTab = 'relief';
            }

            await refreshData();

            // Set default tarikh
            state.tarikhPilih = getTodayString();

            renderTabs();
            renderContent();

            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', async () => {
                await refreshData();
                renderContent();
            });

            // Klik luar untuk tutup login
            loginOverlay.addEventListener('click', (e) => {
                if (e.target === loginOverlay) {
                    loginOverlay.classList.add('hidden');
                    loginPass.value = '';
                    loginError.classList.add('hidden');
                }
            });
        }

        // Start app
        init();
    </script>
</body>
</html>
